# Build and deploy apps/web to Azure App Service (Linux, Node).
# Configure repository secrets and variables (see docs/DEPLOYMENT.md §5.3).

name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: azure-app-service-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            packages/database/package-lock.json
            apps/web/package-lock.json

      - name: Install database package dependencies
        run: npm ci
        working-directory: packages/database

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: packages/database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Install web app dependencies
        run: npm ci
        working-directory: apps/web

      - name: Build Next.js
        run: npm run build
        working-directory: apps/web
        env:
          NODE_ENV: production

      - name: Prune devDependencies
        run: npm prune --omit=dev
        working-directory: apps/web

      - name: Apply database migrations
        run: npx prisma migrate deploy
        working-directory: packages/database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: apps/web
